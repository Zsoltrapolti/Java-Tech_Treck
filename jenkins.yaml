jenkins:
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

tool:
  maven:
    installations:
      - name: "Maven-Jenkins"
        properties:
          - installSource:
              installers:
                - maven:
                    id: "3.9.5"

unclassified:
  sonarGlobalConfiguration:
    installations:
      - name: "sonarqube"
        serverUrl: "http://sonarqube_krumpi:9000"
        credentialsId: "sonar-token"

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "sonar-token"
              secret: "${SONAR_TOKEN}"
              description: "Token pentru SonarQube"