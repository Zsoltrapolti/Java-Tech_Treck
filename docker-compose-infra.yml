version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins_krumpi
    user: root
    ports:
      - "8082:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci-net

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube_krumpi
    ports:
      - "9000:9000"
    networks:
      - ci-net

volumes:
  jenkins_data:

networks:
  ci-net: