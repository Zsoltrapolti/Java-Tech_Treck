version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: krumpi_db
    environment:
      POSTGRES_DB: krumpi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: catalina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: krumpi_app:${APP_VERSION}-b${BUILD_NUMBER}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krumpi_app
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/krumpi_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: catalina
    depends_on:
      - db

volumes:
  postgres_data:
